<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KOIN — AR Celengan (Pinch to Drop)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1A1A2E; color: white; overflow: hidden; }
    .ar-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
    .input-video { display: none; }
    .output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
    
    .header-info { 
      background: rgba(26, 82, 118, 0.85); padding: 16px 24px; border-radius: 20px; 
      text-align: center; backdrop-filter: blur(10px); max-width: 450px; margin: 0 auto; 
      border: 3px solid #F9E79F; box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
    }
    .header-info h2 { font-size: 18px; color: #F39C12; margin-bottom: 6px; font-weight: 900; letter-spacing: 1px;}
    .header-info p { font-size: 13px; color: #FFF; line-height: 1.5; }
    
    .loading-ui { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
      background: rgba(26, 82, 118, 0.9); padding: 24px 32px; border-radius: 20px; 
      text-align: center; z-index: 20; border: 2px solid #F9E79F; 
    }
    .spinner { font-size: 40px; display: block; margin-bottom: 12px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .btn-selesai { 
      position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%); 
      padding: 16px 36px; background: linear-gradient(135deg, #F39C12, #E67E22); 
      color: white; border: none; border-radius: 24px; font-size: 18px; font-weight: 900; 
      pointer-events: auto; cursor: pointer; display: none; 
      box-shadow: 0 8px 25px rgba(243, 156, 18, 0.5); z-index: 30; transition: all 0.2s; 
      border: 2px solid #F9E79F; 
    }
    .btn-selesai:hover { transform: translate(-50%, -4px); box-shadow: 0 12px 30px rgba(243, 156, 18, 0.6); }
  </style>
</head>
<body>

  <audio id="sfx-coin" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
  <audio id="sfx-drop" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
  <audio id="sfx-win" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

  <div class="ar-container">
    <video class="input-video" autoplay playsinline></video>
    <canvas class="output-canvas" id="canvas"></canvas>
    
    <div class="loading-ui" id="loadingUi">
      <span class="spinner">⏳</span>
      <p style="font-weight: 700;">Menyiapkan Kamera Ajaib...</p>
      <p style="font-size: 11px; margin-top: 4px; color: #F9E79F;">Pastikan tanganmu terlihat jelas ya!</p>
    </div>

    <div class="ui-overlay">
      <div class="header-info">
        <h2>💰 MAGIC AR KOIN</h2>
        <p>Cubit (pinch) uang yang melayang dan masukkan ke dalam celengan di bawah!</p>
        <p style="margin-top: 10px; font-weight: 900; font-size: 16px; color: #2ECC71;" id="sisaText">Sisa Uang: Rp 0</p>
      </div>
    </div>

    <button class="btn-selesai" id="btnSelesai" onclick="simpanDanLanjut()">Lanjut ke Wishlist 🚀</button>
  </div>

  <script>
    // ── DATA SETUP ─────────────────────────────────────────────────────────
    const allowanceData = sessionStorage.getItem('allowance');
    const allowance = allowanceData !== null ? parseInt(allowanceData) : 0; 
    const totalSpent = parseInt(sessionStorage.getItem('totalSpent')) || 0;
    const sisa = Math.max(allowance - totalSpent, 0);
    
    document.getElementById('sisaText').textContent = `Sisa Uang: Rp ${new Intl.NumberFormat('id-ID').format(sisa)}`;

    let remainingToDistribute = sisa;
    let balances = { spending: 0, saving: 0, sharing: 0 };

    const sfxCoin = document.getElementById('sfx-coin');
    const sfxDrop = document.getElementById('sfx-drop');
    const sfxWin = document.getElementById('sfx-win');
    
    function playSound(audioEl) {
      audioEl.currentTime = 0;
      audioEl.play().catch(e => console.log("Audio diblokir browser"));
    }

    // ── PECAHAN UANG REALISTIS (RUPIAH ASLI) ───────────────────────────────
    let coins = [];
    const validDenoms = [100000, 50000, 20000, 10000, 5000, 2000, 1000, 500];
    let tempSisa = Math.floor(sisa / 500) * 500; 
    let coinId = 0;
    
    let w = window.innerWidth;
    let h = window.innerHeight;

    while(tempSisa > 0) {
      let pick = validDenoms.find(d => d <= tempSisa / 2) || validDenoms.find(d => d <= tempSisa) || 500;
      
      coins.push({
         id: coinId++,
         baseX: w / 2 + (Math.random() * (w/2) - w/4),
         baseY: h / 4 + (Math.random() * 150),
         x: 0, y: 0,
         radius: pick >= 20000 ? 50 : (pick >= 5000 ? 42 : 35),
         value: pick,
         label: pick >= 1000 ? (pick/1000) + 'K' : String(pick),
         isDragging: false,
         active: true,
         phase: Math.random() * Math.PI * 2
      });
      tempSisa -= pick;
    }

    // ── CANVAS & AR STATE ──────────────────────────────────────────────────
    const videoElement = document.querySelector('.input-video');
    const canvasElement = document.querySelector('.output-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    canvasElement.width = w; canvasElement.height = h;

    let time = 0;

    const bucketW = Math.min(w / 3.5, 200);
    const spacing = (w - (bucketW * 3)) / 4;
    const bucketY = h - 160;
    const bucketH = 130;

    // Tambahin blinkTimer dan state ke masing-masing celengan
    const buckets = [
      { id: 'spending', color: '#E74C3C', label: '🛒 Spending', x: spacing, y: bucketY, w: bucketW, h: bucketH, faceTimer: 0, blinkTimer: 0, state: 'idle' },
      { id: 'saving', color: '#2ECC71', label: '🐷 Saving', x: spacing*2 + bucketW, y: bucketY, w: bucketW, h: bucketH, faceTimer: 0, blinkTimer: 0, state: 'idle' },
      { id: 'sharing', color: '#9B59B6', label: '🤝 Sharing', x: spacing*3 + bucketW*2, y: bucketY, w: bucketW, h: bucketH, faceTimer: 0, blinkTimer: 0, state: 'idle' }
    ];

    let draggedCoin = null;

    // ── FUNGSI GAMBAR MUKA CELENGAN (ANIMASI KEDIP & MANGAP) ───────────────
    function drawBucket(ctx, b) {
      let currentY = b.y;

      // Logic State Celengan
      if (b.faceTimer > 10) {
        b.state = 'happy'; // Pas koin udah masuk (Bouncing & Seneng)
        currentY = b.y - 15;
      } else if (b.faceTimer > 0) {
        b.state = 'hover'; // Pas koin melayang di atasnya (Muka nunggu)
      } else {
        b.state = 'idle';  // Diam normal
      }

      // Logic Kedip (Blink) - Hanya saat idle atau hover
      if (b.blinkTimer > 0) {
        b.blinkTimer--;
      } else if (Math.random() < 0.02 && b.state !== 'happy') {
        b.blinkTimer = 10; // Durasi mata nutup pas kedip (10 frame)
      }

      let isBlinking = b.blinkTimer > 0;

      // Gambar Badan Celengan
      if (b.state === 'happy') {
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 20;
      } else {
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.shadowBlur = 10;
      }

      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.roundRect(b.x, currentY, b.w, b.h, 24);
      ctx.fill();

      ctx.shadowBlur = 0;
      
      // Label Atas
      ctx.fillStyle = 'white';
      ctx.font = 'bold 16px "Segoe UI", Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, b.x + (b.w / 2), currentY + 30);
      
      // ── MENGGAMBAR EKSPRESI WAJAH ──
      const cx = b.x + (b.w / 2);
      const cy = currentY + 65;
      
      ctx.strokeStyle = "white";
      ctx.fillStyle = "white";
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // 1. Mata
      if (b.state === 'happy') {
         // Mata seneng: ^ ^
         ctx.beginPath(); ctx.moveTo(cx - 15, cy - 2); ctx.lineTo(cx - 10, cy - 8); ctx.lineTo(cx - 5, cy - 2); ctx.stroke();
         ctx.beginPath(); ctx.moveTo(cx + 5, cy - 2); ctx.lineTo(cx + 10, cy - 8); ctx.lineTo(cx + 15, cy - 2); ctx.stroke();
      } else if (isBlinking) {
         // Mata kedip: - - (Garis datar)
         ctx.beginPath(); ctx.moveTo(cx - 14, cy - 5); ctx.lineTo(cx - 6, cy - 5); ctx.stroke();
         ctx.beginPath(); ctx.moveTo(cx + 6, cy - 5); ctx.lineTo(cx + 14, cy - 5); ctx.stroke();
      } else {
         // Mata normal: o o (Bulet)
         ctx.beginPath(); ctx.arc(cx - 10, cy - 5, 4, 0, Math.PI*2); ctx.fill();
         ctx.beginPath(); ctx.arc(cx + 10, cy - 5, 4, 0, Math.PI*2); ctx.fill();
      }

      // 2. Mulut
      if (b.state === 'happy') {
         // Mulut Mangap Lebar (D)
         ctx.beginPath(); ctx.arc(cx, cy + 5, 12, 0, Math.PI, false); ctx.fill();
      } else if (b.state === 'hover') {
         // Mulut O (Nunggu koin masuk)
         ctx.beginPath(); ctx.arc(cx, cy + 4, 5, 0, Math.PI*2); ctx.stroke();
      } else {
         // Mulut senyum tipis
         ctx.beginPath(); ctx.arc(cx, cy + 2, 8, 0, Math.PI, false); ctx.stroke();
      }

      // Saldo Tabungan
      ctx.fillStyle = '#F9E79F';
      ctx.font = '900 18px "Segoe UI", Arial';
      ctx.fillText(`Rp ${new Intl.NumberFormat('id-ID').format(balances[b.id])}`, cx, currentY + 110);
    }

    // ── AI HAND TRACKING LOGIC ─────────────────────────────────────────────
    function onResults(results) {
      time += 0.05; 
      document.getElementById('loadingUi').style.display = 'none';
      
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      canvasCtx.save();
      canvasCtx.scale(-1, 1);
      canvasCtx.translate(-canvasElement.width, 0);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore(); 

      // Turunin faceTimer buat tiap frame
      buckets.forEach(b => {
        if (b.faceTimer > 0) b.faceTimer--;
        drawBucket(canvasCtx, b);
      });

      let isPinching = false;
      let pinchX = 0;
      let pinchY = 0;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        for (const landmarks of results.multiHandLandmarks) {
            const mirroredLandmarks = landmarks.map(lm => ({ x: 1 - lm.x, y: lm.y, z: lm.z }));
            drawConnectors(canvasCtx, mirroredLandmarks, HAND_CONNECTIONS, {color: '#F39C12', lineWidth: 4});
            drawLandmarks(canvasCtx, mirroredLandmarks, {color: '#FFF3CC', lineWidth: 2, radius: 4});
        }

        const landmarks = results.multiHandLandmarks[0];
        const tx = (1 - landmarks[4].x) * w; 
        const ty = landmarks[4].y * h;
        const ix = (1 - landmarks[8].x) * w;
        const iy = landmarks[8].y * h;

        const dist = Math.hypot(tx - ix, ty - iy);
        if (dist < 90) { 
          isPinching = true;
          pinchX = (tx + ix) / 2;
          pinchY = (ty + iy) / 2;
          
          canvasCtx.beginPath();
          canvasCtx.arc(pinchX, pinchY, 25, 0, 2 * Math.PI);
          canvasCtx.fillStyle = 'rgba(243, 156, 18, 0.7)';
          canvasCtx.fill();
          canvasCtx.lineWidth = 4;
          canvasCtx.strokeStyle = '#FFFFFF';
          canvasCtx.stroke();
        }
      }

      // ── LOGIC DRAG AND DROP ──────────────────────────────────────────────
      if (isPinching) {
        if (!draggedCoin) {
          for (let i = coins.length - 1; i >= 0; i--) {
            let c = coins[i];
            if (c.active) {
              const d = Math.hypot(c.x - pinchX, c.y - pinchY);
              if (d < c.radius + 80) { 
                c.isDragging = true;
                draggedCoin = c;
                playSound(sfxCoin); 
                break; 
              }
            }
          }
        } else {
          draggedCoin.x = pinchX;
          draggedCoin.y = pinchY;

          buckets.forEach(b => {
             // Kalau koin di atas celengan, set faceTimer ke 2 terus (Hover State)
             if (draggedCoin.x > b.x && draggedCoin.x < b.x + b.w && draggedCoin.y > b.y - 100) {
                 b.faceTimer = 2; 
             }
          });
        }
      } else {
        if (draggedCoin) {
          let droppedInBucket = false;
          
          buckets.forEach(b => {
            if (draggedCoin.x > b.x && draggedCoin.x < b.x + b.w && 
                draggedCoin.y > b.y - 100 && draggedCoin.y < b.y + b.h) {
              
              balances[b.id] += draggedCoin.value;
              remainingToDistribute -= draggedCoin.value;
              draggedCoin.active = false; 
              droppedInBucket = true;
              
              b.faceTimer = 25; // Set timer agak lama biar animasi loncatnya kelihatan
              playSound(sfxDrop); 
              
              if (remainingToDistribute <= 0) {
                document.getElementById('btnSelesai').style.display = 'block';
                playSound(sfxWin); 
              }
            }
          });
          
          if(!droppedInBucket){ draggedCoin.isDragging = false; }
          draggedCoin = null;
        }
      }

      // ── RENDER KOIN ──────────────────────────────────────────────────────
      coins.forEach(c => {
        if (c.active) {
          if (!c.isDragging) {
              c.x = c.baseX + Math.sin(time + c.phase) * 10; 
              c.y = c.baseY + Math.cos(time + c.phase) * 15; 
          }

          canvasCtx.beginPath();
          canvasCtx.arc(c.x, c.y, c.radius, 0, 2 * Math.PI);
          canvasCtx.fillStyle = c.value >= 50000 ? '#3498DB' : (c.value >= 10000 ? '#2ECC71' : '#F1C40F');
          canvasCtx.fill();
          
          canvasCtx.beginPath();
          canvasCtx.arc(c.x, c.y, c.radius - 5, 0, 2 * Math.PI);
          canvasCtx.lineWidth = 3;
          canvasCtx.strokeStyle = 'rgba(255,255,255,0.4)';
          canvasCtx.stroke();
          
          canvasCtx.fillStyle = '#FFFFFF';
          canvasCtx.font = `bold ${c.radius / 1.5}px Arial`;
          canvasCtx.textAlign = 'center';
          canvasCtx.textBaseline = 'middle';
          canvasCtx.fillText(c.label, c.x, c.y + 2);
        }
      });

      canvasCtx.restore();
    }

    // ── SETUP KAMERA & AI ──────────────────────────────────────────────────
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
    
    if(sisa > 0) { camera.start(); } 
    else {
        document.getElementById('loadingUi').innerHTML = "<p>Semua uang jajan sudah habis dibelanjakan!</p>";
        setTimeout(() => simpanDanLanjut(), 3000);
    }

    window.addEventListener('resize', () => {
      w = window.innerWidth; h = window.innerHeight;
      canvasElement.width = w; canvasElement.height = h;
      const newBucketW = Math.min(w / 3.5, 200);
      const newSpacing = (w - (newBucketW * 3)) / 4;
      const newBucketY = h - 160;
      buckets[0].x = newSpacing; buckets[0].y = newBucketY; buckets[0].w = newBucketW;
      buckets[1].x = newSpacing*2 + newBucketW; buckets[1].y = newBucketY; buckets[1].w = newBucketW;
      buckets[2].x = newSpacing*3 + newBucketW*2; buckets[2].y = newBucketY; buckets[2].w = newBucketW;
    });

    function simpanDanLanjut() {
      sessionStorage.setItem('celengan', JSON.stringify({ spending: balances.spending, saving: balances.saving, sharing: balances.sharing }));
      if (videoElement.srcObject) videoElement.srcObject.getTracks().forEach(track => track.stop());
      window.location.href = 'wishlist.html';
    }
  </script>
</body>
</html>
